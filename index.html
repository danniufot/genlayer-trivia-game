<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GenLayer Trivia</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --card: #1a1a26;
    --accent: #00ff88;
    --accent2: #7c3aed;
    --accent3: #ff6b35;
    --text: #f0f0ff;
    --muted: #6b6b8a;
    --border: #2a2a3a;
    --correct: #00ff88;
    --incorrect: #ff4444;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(ellipse at 60% 20%, rgba(124,58,237,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 20% 80%, rgba(0,255,136,0.06) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
    animation: bgshift 12s ease-in-out infinite alternate;
  }

  @keyframes bgshift {
    from { transform: translate(0,0); }
    to { transform: translate(30px, 20px); }
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 680px;
    margin: 0 auto;
    padding: 32px 20px 60px;
  }

  /* Header */
  header {
    text-align: center;
    margin-bottom: 48px;
  }

  .logo-tag {
    display: inline-block;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 4px 12px;
    margin-bottom: 16px;
    text-transform: uppercase;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(36px, 8vw, 64px);
    font-weight: 800;
    line-height: 1;
    letter-spacing: -2px;
    color: var(--text);
  }

  h1 span {
    color: var(--accent);
    display: block;
  }

  .subtitle {
    margin-top: 12px;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  /* Score bar */
  .scorebar {
    display: flex;
    gap: 12px;
    margin-bottom: 32px;
  }

  .score-chip {
    flex: 1;
    background: var(--card);
    border: 1px solid var(--border);
    padding: 14px 20px;
    text-align: center;
  }

  .score-chip .val {
    font-family: 'Syne', sans-serif;
    font-size: 32px;
    font-weight: 800;
    color: var(--accent);
    line-height: 1;
  }

  .score-chip .label {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* Contract config */
  .config-card {
    background: var(--card);
    border: 1px solid var(--border);
    padding: 20px;
    margin-bottom: 24px;
  }

  .config-card label {
    display: block;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .config-card input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .config-card input:focus {
    border-color: var(--accent);
  }

  /* Main card */
  .game-card {
    background: var(--card);
    border: 1px solid var(--border);
    padding: 32px;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
  }

  .game-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent2), var(--accent), var(--accent3));
  }

  .section-label {
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  /* Topic input area */
  .topic-row {
    display: flex;
    gap: 12px;
    align-items: stretch;
  }

  .topic-row input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    padding: 14px 18px;
    outline: none;
    transition: border-color 0.2s;
  }

  .topic-row input:focus {
    border-color: var(--accent);
  }

  .topic-row input::placeholder {
    color: var(--muted);
  }

  /* Buttons */
  .btn {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 14px 24px;
    border: none;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
  }

  .btn-primary {
    background: var(--accent);
    color: #000;
  }

  .btn-primary:hover:not(:disabled) {
    background: #fff;
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(0,255,136,0.3);
  }

  .btn-secondary {
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--accent);
  }

  .btn-secondary:hover:not(:disabled) {
    background: rgba(0,255,136,0.1);
  }

  .btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .btn-full { width: 100%; }

  /* Question display */
  .question-box {
    display: none;
    margin-top: 28px;
    padding-top: 28px;
    border-top: 1px solid var(--border);
  }

  .question-box.visible { display: block; }

  .question-number {
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--accent2);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .question-text {
    font-family: 'Syne', sans-serif;
    font-size: clamp(18px, 4vw, 24px);
    font-weight: 700;
    line-height: 1.4;
    color: var(--text);
    margin-bottom: 24px;
  }

  .answer-row {
    display: flex;
    gap: 12px;
  }

  .answer-row input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    padding: 14px 18px;
    outline: none;
    transition: border-color 0.2s;
  }

  .answer-row input:focus { border-color: var(--accent2); }
  .answer-row input::placeholder { color: var(--muted); }

  /* Result display */
  .result-box {
    display: none;
    margin-top: 20px;
    padding: 20px;
    border-left: 3px solid var(--accent);
    background: rgba(0,255,136,0.05);
    animation: slideIn 0.3s ease;
  }

  .result-box.incorrect {
    border-color: var(--incorrect);
    background: rgba(255,68,68,0.05);
  }

  .result-box.visible { display: block; }

  .result-label {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 8px;
    color: var(--accent);
  }

  .result-box.incorrect .result-label { color: var(--incorrect); }

  .result-text {
    font-size: 13px;
    color: var(--text);
    line-height: 1.6;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Loading state */
  .loading {
    display: none;
    align-items: center;
    gap: 12px;
    padding: 16px 0;
    color: var(--muted);
    font-size: 12px;
    letter-spacing: 1px;
  }

  .loading.visible { display: flex; }

  .spinner {
    width: 18px;
    height: 18px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Topic pills */
  .topic-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 14px;
  }

  .pill {
    font-size: 11px;
    padding: 5px 12px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    cursor: pointer;
    font-family: 'Space Mono', monospace;
    transition: all 0.15s;
  }

  .pill:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* History */
  .history-card {
    background: var(--card);
    border: 1px solid var(--border);
    padding: 24px;
  }

  .history-title {
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 16px;
    color: var(--muted);
  }

  .history-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    max-height: 240px;
    overflow-y: auto;
  }

  .history-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    background: var(--bg);
    border: 1px solid var(--border);
    font-size: 12px;
  }

  .history-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .dot-correct { background: var(--correct); }
  .dot-incorrect { background: var(--incorrect); }
  .dot-pending { background: var(--muted); }

  .history-q {
    flex: 1;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .history-badge {
    font-size: 10px;
    padding: 2px 8px;
    letter-spacing: 1px;
  }

  .badge-correct { color: var(--correct); border: 1px solid var(--correct); }
  .badge-incorrect { color: var(--incorrect); border: 1px solid var(--incorrect); }

  .empty-history {
    color: var(--muted);
    font-size: 12px;
    text-align: center;
    padding: 20px;
    letter-spacing: 1px;
  }

  /* Status toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 12px 24px;
    font-size: 12px;
    letter-spacing: 1px;
    transition: transform 0.3s ease;
    z-index: 100;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); }
</style>
</head>
<body>

<div class="container">

  <header>
    <div class="logo-tag">⬡ GenLayer Protocol</div>
    <h1>Trivia<span>Chain</span></h1>
    <p class="subtitle">// AI-verified questions · on-chain consensus · powered by GenLayer</p>
  </header>

  <!-- Score -->
  <div class="scorebar">
    <div class="score-chip">
      <div class="val" id="scoreVal">0</div>
      <div class="label">Correct</div>
    </div>
    <div class="score-chip">
      <div class="val" id="totalVal">0</div>
      <div class="label">Total</div>
    </div>
    <div class="score-chip">
      <div class="val" id="pctVal">—</div>
      <div class="label">Accuracy</div>
    </div>
  </div>

  <!-- Contract config -->
  <div class="config-card">
    <label>Contract Address</label>
    <input type="text" id="contractAddr" placeholder="0x... (paste your deployed contract address)" />
  </div>

  <!-- Game card -->
  <div class="game-card">
    <div class="section-label">// Ask a Question</div>

    <div class="topic-row">
      <input type="text" id="topicInput" placeholder="Enter a topic..." />
      <button class="btn btn-primary" id="askBtn" onclick="askQuestion()">Generate</button>
    </div>

    <div class="topic-pills">
      <button class="pill" onclick="setTopic('Blockchain')">Blockchain</button>
      <button class="pill" onclick="setTopic('GenLayer')">GenLayer</button>
      <button class="pill" onclick="setTopic('Cryptography')">Cryptography</button>
      <button class="pill" onclick="setTopic('Web3')">Web3</button>
      <button class="pill" onclick="setTopic('Smart Contracts')">Smart Contracts</button>
      <button class="pill" onclick="setTopic('History')">History</button>
      <button class="pill" onclick="setTopic('Science')">Science</button>
    </div>

    <div class="loading" id="askLoading">
      <div class="spinner"></div>
      <span>Generating question via consensus...</span>
    </div>

    <!-- Question + Answer -->
    <div class="question-box" id="questionBox">
      <div class="question-number" id="questionNumber">Question #1</div>
      <div class="question-text" id="questionText"></div>

      <div class="answer-row">
        <input type="text" id="answerInput" placeholder="Type your answer..." onkeydown="if(event.key==='Enter') submitAnswer()" />
        <button class="btn btn-secondary" id="submitBtn" onclick="submitAnswer()">Submit</button>
      </div>

      <div class="loading" id="submitLoading">
        <div class="spinner"></div>
        <span>Verifying answer on-chain...</span>
      </div>

      <div class="result-box" id="resultBox">
        <div class="result-label" id="resultLabel">Result</div>
        <div class="result-text" id="resultText"></div>
      </div>

      <div style="margin-top: 20px;">
        <button class="btn btn-primary btn-full" id="nextBtn" onclick="nextQuestion()" style="display:none;">
          Next Question →
        </button>
      </div>
    </div>
  </div>

  <!-- History -->
  <div class="history-card">
    <div class="history-title">// Round History</div>
    <div class="history-list" id="historyList">
      <div class="empty-history">No questions yet — start playing!</div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  // ── State ──────────────────────────────────────────────
  let score = 0;
  let total = 0;
  let currentQuestion = '';
  let history = [];
  let waitingForNext = false;

  // ── Helpers ────────────────────────────────────────────
  function getContract() {
    return document.getElementById('contractAddr').value.trim();
  }

  function setTopic(t) {
    document.getElementById('topicInput').value = t;
    document.getElementById('topicInput').focus();
  }

  function showToast(msg, duration = 3000) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), duration);
  }

  function updateScoreboard() {
    document.getElementById('scoreVal').textContent = score;
    document.getElementById('totalVal').textContent = total;
    document.getElementById('pctVal').textContent = total > 0
      ? Math.round((score / total) * 100) + '%'
      : '—';
  }

  function renderHistory() {
    const list = document.getElementById('historyList');
    if (history.length === 0) {
      list.innerHTML = '<div class="empty-history">No questions yet — start playing!</div>';
      return;
    }
    list.innerHTML = history.slice().reverse().map(h => `
      <div class="history-item">
        <div class="history-dot ${h.result === 'correct' ? 'dot-correct' : h.result === 'incorrect' ? 'dot-incorrect' : 'dot-pending'}"></div>
        <div class="history-q" title="${h.question}">${h.question}</div>
        ${h.result !== 'pending' ? `<div class="history-badge ${h.result === 'correct' ? 'badge-correct' : 'badge-incorrect'}">${h.result.toUpperCase()}</div>` : ''}
      </div>
    `).join('');
  }

  // ── GenLayer JSON-RPC API ──────────────────────────────
  // GenLayer Studio runs a local node at port 4000
  // For GitHub Pages deployment, we use the public testnet RPC
  const RPC_URL = 'https://studio.genlayer.com/api/rpc-node';

  async function rpcCall(method, params) {
    const res = await fetch(RPC_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ jsonrpc: '2.0', id: Date.now(), method, params })
    });
    const data = await res.json();
    if (data.error) throw new Error(JSON.stringify(data.error));
    return data.result;
  }

  async function genlayerWrite(method, params) {
    const addr = getContract();
    if (!addr) { showToast('⚠ Paste your contract address first'); return null; }

    try {
      // Send transaction to write method
      const txHash = await rpcCall('gen_sendTransaction', [{
        to: addr,
        from: '0x0000000000000000000000000000000000000001',
        data: { method, args: params }
      }]);

      showToast('⏳ Waiting for consensus...');

      // Poll for transaction receipt
      for (let i = 0; i < 30; i++) {
        await new Promise(r => setTimeout(r, 2000));
        try {
          const receipt = await rpcCall('eth_getTransactionReceipt', [txHash]);
          if (receipt && receipt.status) {
            // Get result from contract state
            const result = await genlayerRead('get_last_result');
            return result || receipt.status;
          }
        } catch(e) { /* keep polling */ }
      }
      throw new Error('Timeout waiting for transaction');

    } catch(e) {
      console.warn('RPC call failed, using simulation:', e.message);
      return simulateFallback(method, params);
    }
  }

  async function genlayerRead(method, params = []) {
    const addr = getContract();
    if (!addr) return null;

    try {
      const result = await rpcCall('gen_call', [{
        to: addr,
        data: { method, args: params }
      }]);
      return result;
    } catch(e) {
      return null;
    }
  }

  // Fallback simulation for demo
  const sampleQuestions = {
    'Blockchain': 'What consensus mechanism does Bitcoin use to validate transactions?',
    'GenLayer': 'What is the name of the consensus principle used in GenLayer intelligent contracts?',
    'Cryptography': 'What does SHA stand for in SHA-256?',
    'Web3': 'What standard defines fungible tokens on Ethereum?',
    'Smart Contracts': 'Which programming language is primarily used to write Ethereum smart contracts?',
    'History': 'In what year was the Bitcoin whitepaper published by Satoshi Nakamoto?',
    'Science': 'What is the speed of light in a vacuum, approximately?',
  };

  function simulateFallback(method, params) {
    if (method === 'ask_question') {
      const topic = params[0] || 'General';
      return sampleQuestions[topic] || `What is an important fact about ${topic}?`;
    }
    if (method === 'submit_answer') {
      const answers = ['CORRECT', 'INCORRECT'];
      return answers[Math.floor(Math.random() * 2)];
    }
    return null;
  }

  // ── Game Logic ─────────────────────────────────────────
  async function askQuestion() {
    const topic = document.getElementById('topicInput').value.trim();
    if (!topic) { showToast('⚠ Enter a topic first'); return; }

    const askBtn = document.getElementById('askBtn');
    const loading = document.getElementById('askLoading');
    const questionBox = document.getElementById('questionBox');
    const resultBox = document.getElementById('resultBox');
    const nextBtn = document.getElementById('nextBtn');

    askBtn.disabled = true;
    loading.classList.add('visible');
    questionBox.classList.remove('visible');
    resultBox.classList.remove('visible');
    nextBtn.style.display = 'none';
    waitingForNext = false;

    await genlayerWrite('ask_question', [topic]);
    // Read the generated question from contract state
    const question = await genlayerRead('get_last_question') || simulateFallback('ask_question', [topic]);

    loading.classList.remove('visible');
    askBtn.disabled = false;

    if (!question) { showToast('⚠ Failed to generate question'); return; }

    currentQuestion = question;
    total++;
    updateScoreboard();

    document.getElementById('questionNumber').textContent = `Question #${total}`;
    document.getElementById('questionText').textContent = question;
    document.getElementById('answerInput').value = '';
    document.getElementById('submitBtn').disabled = false;

    history.push({ question, result: 'pending' });
    renderHistory();

    questionBox.classList.add('visible');
    document.getElementById('answerInput').focus();
  }

  async function submitAnswer() {
    if (waitingForNext) return;
    const answer = document.getElementById('answerInput').value.trim();
    if (!answer) { showToast('⚠ Type your answer first'); return; }

    const submitBtn = document.getElementById('submitBtn');
    const loading = document.getElementById('submitLoading');
    const resultBox = document.getElementById('resultBox');
    const nextBtn = document.getElementById('nextBtn');

    submitBtn.disabled = true;
    loading.classList.add('visible');
    resultBox.classList.remove('visible');

    await genlayerWrite('submit_answer', [currentQuestion, answer]);
    // Read result from contract state
    const result = await genlayerRead('get_last_result') || simulateFallback('submit_answer', [currentQuestion, answer]);

    loading.classList.remove('visible');

    if (!result) { submitBtn.disabled = false; showToast('⚠ Failed to verify answer'); return; }

    const isCorrect = result.toUpperCase().includes('CORRECT') && !result.toUpperCase().includes('INCORRECT');

    if (isCorrect) {
      score++;
      resultBox.className = 'result-box visible';
      document.getElementById('resultLabel').textContent = '✓ Correct!';
    } else {
      resultBox.className = 'result-box incorrect visible';
      document.getElementById('resultLabel').textContent = '✗ Incorrect';
    }

    document.getElementById('resultText').textContent = result;
    updateScoreboard();

    // Update history
    const last = history[history.length - 1];
    if (last) last.result = isCorrect ? 'correct' : 'incorrect';
    renderHistory();

    waitingForNext = true;
    nextBtn.style.display = 'block';
  }

  function nextQuestion() {
    document.getElementById('questionBox').classList.remove('visible');
    document.getElementById('resultBox').classList.remove('visible');
    document.getElementById('nextBtn').style.display = 'none';
    waitingForNext = false;
    document.getElementById('topicInput').focus();
    showToast('Pick a topic for your next question!');
  }

  // Init
  updateScoreboard();
</script>
</body>
</html>
